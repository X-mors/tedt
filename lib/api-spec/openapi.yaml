  /admin/wallet/settings:
    get:
      operationId: getWalletSettings
      tags: [admin]
      summary: Get crypto wallet configuration settings
      responses:
        "200":
          description: Wallet settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateWalletSettings
      tags: [admin]
      summary: Update crypto wallet configuration settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWalletSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

# ============================================================================
# Components
# ============================================================================
components:
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Not signed in
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Role:
      type: string
      enum: [admin, owner, renter]
      description: A user can act as renter or owner; admin is the site operator.

    MeProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        balanceUsd:
          type: number
          description: Current internal balance in USD
        totalDepositedUsd:
          type: number
        totalEarnedUsd:
          type: number
          description: Lifetime earnings as a rig owner
        totalSpentUsd:
          type: number
          description: Lifetime spend as a renter
        rigCount:
          type: integer
          description: Number of rigs the user owns (used by the UI to show the lessor nav)
        rentalCount:
          type: integer
          description: Number of rentals the user has placed
        createdAt:
          type: string
          format: date-time
        stratumUsername:
          type: string
          nullable: true
          description: User-chosen Stratum username (prefix in `username.rigname` worker format). Null until set.
      required:
        - id
        - clerkUserId
        - email
        - displayName
        - role
        - balanceUsd
        - totalDepositedUsd
        - totalEarnedUsd
        - totalSpentUsd
        - rigCount
        - rentalCount
        - createdAt
        - stratumUsername

    UpdateMeBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
        stratumUsername:
          type: string
          pattern: "^[a-z0-9-]{3,24}$"
          description: Stratum username slug (3-24 chars, lowercase letters, digits, hyphens only). Must be globally unique.

    Algorithm:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Algorithm name (e.g. SHA-256, Scrypt, Ethash, RandomX)
        slug:
          type: string
        unit:
          type: string
          description: Hashrate unit shown in UI (e.g. "TH/s", "GH/s", "MH/s", "kH/s")
        basePricePerUnitPerHour:
          type: number
          description: Base USD price per unit of hashrate per hour, set by admin
        rigCount:
          type: integer
          description: Number of available rigs on this algorithm
        totalHashrate:
          type: number
          description: Sum of advertised hashrate for available rigs (in `unit`)
        averagePricePerUnitPerHour:
          type: number
          description: Average renter-facing price across active rigs
      required:
        - id
        - name
        - slug
        - unit
        - basePricePerUnitPerHour
        - rigCount
        - totalHashrate
        - averagePricePerUnitPerHour

    CreateAlgorithmBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        unit:
          type: string
          minLength: 1
        basePricePerUnitPerHour:
          type: number
          minimum: 0
      required: [name, slug, unit, basePricePerUnitPerHour]

    UpdateAlgorithmBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        unit:
          type: string
          minLength: 1
        basePricePerUnitPerHour:
          type: number
          minimum: 0

    RigStatus:
      type: string
      enum: [available, rented, offline, paused]

    RigApprovalStatus:
      type: string
      enum: [pending, approved, rejected]

    RigSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
          description: Advertised hashrate in the algorithm's unit
        pricePerUnitPerHour:
          type: number
          description: Renter-facing price (already includes the renter commission)
        minRentalHours:
          type: integer
        maxRentalHours:
          type: integer
        status:
          $ref: "#/components/schemas/RigStatus"
        approvalStatus:
          $ref: "#/components/schemas/RigApprovalStatus"
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        isOnline:
          type: boolean
          description: "True while the owner's miner is connected to the Stratum proxy"
        hasFallbackPool:
          type: boolean
          description: "True when the rig has a fallback pool configured (always false in public/marketplace views)"
        stratumName:
          type: string
          nullable: true
          description: "Worker name component in the `username.rigname` format. Null for rigs created before this feature or not yet connected via new-style auth."
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ownerId
        - ownerDisplayName
        - algorithmId
        - algorithmName
        - algorithmUnit
        - hashrate
        - pricePerUnitPerHour
        - minRentalHours
        - maxRentalHours
        - status
        - approvalStatus
        - averageRating
        - reviewCount
        - isOnline
        - hasFallbackPool
        - stratumName
        - createdAt

    RigDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
        pricePerUnitPerHour:
          type: number
        minRentalHours:
          type: integer
        maxRentalHours:
          type: integer
        status:
          $ref: "#/components/schemas/RigStatus"
        approvalStatus:
          $ref: "#/components/schemas/RigApprovalStatus"
        approvalNote:
          type: ["string", "null"]
        region:
          type: string
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        totalRentals:
          type: integer
        # Placeholder stratum endpoint the owner should point their miner at.
        # Populated for the rig owner; null for public / renter views.
        # Real routing is wired in Task 2 (Stratum proxy service).
        ownerStratumUrl:
          type: ["string", "null"]
          description: "stratum+tcp:// URL for the owner to point their miner at (placeholder until Task 2)"
        ownerWorker:
          type: ["string", "null"]
          description: "Worker name the owner's miner should use"
        ownerPassword:
          type: ["string", "null"]
          description: "Password field for the owner's miner — any value is accepted (e.g. 'x'); the proxy authenticates by stratumUsername alone"
        isOnline:
          type: boolean
          description: "True while the owner's miner is connected to the Stratum proxy"
        hasFallbackPool:
          type: boolean
          description: "True when the rig has a fallback pool configured (will mine there when not rented)"
        fallbackPoolHost:
          type: string
          nullable: true
          description: "Hostname of the owner's personal fallback pool. Only populated in owner views."
        fallbackPoolPort:
          type: integer
          nullable: true
          description: "Port of the owner's personal fallback pool. Only populated in owner views."
        fallbackPoolUser:
          type: string
          nullable: true
          description: "Worker name for the fallback pool. Only populated in owner views."
        fallbackPoolPassword:
          type: string
          nullable: true
          description: "Password for the fallback pool worker. Only populated in owner views."
        stratumName:
          type: string
          nullable: true
          description: "Worker name component in the `username.rigname` format. Null for legacy/web-created rigs not yet connected via new-style auth."
        fallbackPoolConnected:
          type: boolean
          description: "True when the miner is connected and the fallback pool connection is verified (mining.authorize accepted). Null when the miner is not connected."
          nullable: true
        fallbackPoolAuthFailed:
          type: boolean
          description: "True when the fallback pool rejected the worker credentials (wrong worker name or password). Null when the miner is not connected."
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - ownerId
        - ownerDisplayName
        - algorithmId
        - algorithmName
        - algorithmUnit
        - hashrate
        - pricePerUnitPerHour
        - minRentalHours
        - maxRentalHours
        - status
        - approvalStatus
        - approvalNote
        - region
        - averageRating
        - reviewCount
        - totalRentals
        - ownerStratumUrl
        - ownerWorker
        - ownerPassword
        - isOnline
        - hasFallbackPool
        - fallbackPoolHost
        - fallbackPoolPort
        - fallbackPoolUser
        - fallbackPoolPassword
        - stratumName
        - createdAt

    CreateRigBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 1000
        algorithmId:
          type: integer
        hashrate:
          type: number
          minimum: 0
          exclusiveMinimum: true
        minRentalHours:
          type: integer
          minimum: 1
        maxRentalHours:
          type: integer
          minimum: 1
        region:
          type: string
          minLength: 1
        fallbackPoolHost:
          type: string
          description: Hostname or IP of the owner's personal mining pool for use when the rig is not rented.
        fallbackPoolPort:
          type: integer
          minimum: 1
          maximum: 65535
        fallbackPoolUser:
          type: string
          description: Worker name to use when connecting to the fallback pool.
        fallbackPoolPassword:
          type: string
          description: Password for the fallback pool worker (usually "x").
      required:
        - name
        - description
        - algorithmId
        - hashrate
        - minRentalHours
        - maxRentalHours
        - region

    UpdateRigBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 1000
        hashrate:
          type: number
          minimum: 0
          exclusiveMinimum: true
        minRentalHours:
          type: integer
          minimum: 1
        maxRentalHours:
          type: integer
          minimum: 1
        region:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/RigStatus"
        fallbackPoolHost:
          type: string
          description: Hostname or IP of the owner's personal mining pool. Set to empty string to remove.
        fallbackPoolPort:
          type: integer
          minimum: 1
          maximum: 65535
        fallbackPoolUser:
          type: string
