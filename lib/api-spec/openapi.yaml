openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RigMarket API — mining rig rental marketplace
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: marketplace
    description: Public marketplace browsing and aggregates
  - name: algorithms
    description: Mining algorithm catalog
  - name: rigs
    description: Mining rig listings (lessor inventory)
  - name: rentals
    description: Rental orders, quotes, and live stats
  - name: reviews
    description: Renter reviews of completed rentals
  - name: wallet
    description: Internal balance, deposits, and withdrawals
  - name: me
    description: Current authenticated user
  - name: admin
    description: Admin-only operations (site owner)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ========================================================================
  # Current user (me)
  # ========================================================================
  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get the current authenticated user with role and wallet snapshot
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMe
      tags: [me]
      summary: Update the current user's display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/upgrade-to-owner:
    post:
      operationId: upgradeToOwner
      tags: [me]
      summary: Upgrade the current renter account to owner role so they can list rigs
      security:
        - clerk: []
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: Already an owner or admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/sync:
    post:
      operationId: syncMe
      tags: [me]
      summary: Upsert the current user record from Clerk identity (called once after sign-in)
      responses:
        "200":
          description: Synced user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Marketplace browsing
  # ========================================================================
  /marketplace/featured:
    get:
      operationId: getMarketplaceFeatured
      tags: [marketplace]
      summary: Featured rigs — highest-rated, currently available rigs across top algorithms
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Featured rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"

  /marketplace/algorithm-stats:
    get:
      operationId: getMarketplaceAlgorithmStats
      tags: [marketplace]
      summary: Per-algorithm marketplace stats — hashrate available, rig count, avg price, rental volume
      responses:
        "200":
          description: Algorithm marketplace statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlgorithmMarketStat"

  /marketplace/summary:
    get:
      operationId: getMarketplaceSummary
      tags: [marketplace]
      summary: Top-line marketplace statistics (rig counts, total hashrate, average prices)
      responses:
        "200":
          description: Marketplace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSummary"

  /algorithms:
    get:
      operationId: listAlgorithms
      tags: [algorithms]
      summary: List all mining algorithms with pricing and rig counts
      responses:
        "200":
          description: Algorithm catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Algorithm"

  /rigs:
    get:
      operationId: listRigs
      tags: [rigs]
      summary: Browse available rigs with optional filters
      parameters:
        - in: query
          name: algorithmId
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [available, rented, offline, paused]
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [price_asc, price_desc, hashrate_desc, newest, rating_desc]
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Rig listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"

  /rigs/{id}:
    get:
      operationId: getRig
      tags: [rigs]
      summary: Get full details for a single rig
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Rig details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /rigs/{id}/reviews:
    get:
      operationId: listRigReviews
      tags: [reviews]
      summary: List reviews for a rig
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # ========================================================================
  # Rig owner (lessor) endpoints
  # ========================================================================
  /me/rigs:
    get:
      operationId: listMyRigs
      tags: [rigs]
      summary: List rigs owned by the current user
      responses:
        "200":
          description: My rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRig
      tags: [rigs]
      summary: List a new rig for rent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRigBody"
      responses:
        "201":
          description: Created rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rigs/{id}:
    get:
      operationId: getMyRig
      tags: [rigs]
      summary: Load a rig you own (works for pending/rejected rigs that are hidden from the public marketplace)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Owner-scoped rig detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMyRig
      tags: [rigs]
      summary: Update a rig you own
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRigBody"
      responses:
        "200":
          description: Updated rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMyRig
      tags: [rigs]
      summary: Delete a rig you own (only if no active rentals)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rentals/lessor:
    get:
      operationId: listLessorRentals
      tags: [rentals]
      summary: List rentals on rigs owned by the current user
      responses:
        "200":
          description: Rentals on my rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Renter endpoints
  # ========================================================================
  /rentals/quote:
    post:
      operationId: createRentalQuote
      tags: [rentals]
      summary: Compute pricing breakdown for a potential rental (no commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RentalQuoteBody"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalQuote"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /rentals:
    post:
      operationId: createRental
      tags: [rentals]
      summary: Place a rental order — debits the renter's wallet and reserves the rig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalBody"
      responses:
        "201":
          description: Rental created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rentals/{id}:
    get:
      operationId: getRental
      tags: [rentals]
      summary: Get rental details (renter or rig owner only)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/stats:
    get:
      operationId: getRentalStats
      tags: [rentals]
      summary: Live mining stats for a rental (placeholder until Stratum proxy ships)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Live stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalStats"
        "404":
          $ref: "#/components/responses/NotFound"

  /rentals/{id}/cancel:
    post:
      operationId: cancelRental
      tags: [rentals]
      summary: Cancel an active rental — refunds remaining time prorated
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Cancelled rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/review:
    post:
      operationId: createRentalReview
      tags: [reviews]
      summary: Submit a review for a completed rental (renter only, once)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rentals:
    get:
      operationId: listMyRentals
      tags: [rentals]
      summary: List rentals placed by the current user (renter view)
      responses:
        "200":
          description: My rentals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Wallet
  # ========================================================================
  /me/wallet:
    get:
      operationId: getMyWallet
      tags: [wallet]
      summary: Wallet balances and recent transactions for the current user
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wallet/deposits:
    post:
      operationId: createDeposit
      tags: [wallet]
      summary: "Placeholder — crypto deposit rails not yet active (Task #3)"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositBody"
      responses:
        "503":
          description: Deposits not yet active — placeholder endpoint
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wallet/withdrawals:
    get:
      operationId: listMyWithdrawals
      tags: [wallet]
      summary: List the current user's withdrawal requests
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createWithdrawal
      tags: [wallet]
      summary: Submit a withdrawal request (admin must approve)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWithdrawalBody"
      responses:
        "201":
          description: Withdrawal request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ========================================================================
  # Dashboard summaries (authenticated)
  # ========================================================================
  /dashboard/owner-summary:
    get:
      operationId: getDashboardOwnerSummary
      tags: [dashboard]
      summary: Owner dashboard — rig counts, total earnings, active rentals, pending payouts
      security:
        - clerk: []
      responses:
        "200":
          description: Owner dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerDashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/renter-summary:
    get:
      operationId: getDashboardRenterSummary
      tags: [dashboard]
      summary: Renter dashboard — active rental count, total spend, favourite algorithm, spending this month
      security:
        - clerk: []
      responses:
        "200":
          description: Renter dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenterDashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Admin (site owner only)
  # ========================================================================
  /admin/summary:
    get:
      operationId: getAdminSummary
      tags: [admin]
      summary: Condensed admin overview — key headline numbers for the admin nav bar / quick-glance widget
      security:
        - clerk: []
      responses:
        "200":
          description: Admin summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform-wide aggregates for the admin dashboard
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all platform users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/wallet/credit:
    post:
      operationId: adminCreditWallet
      tags: [admin]
      summary: Manually credit (or debit) a user's wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreditBody"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/commission:
    get:
      operationId: getCommissionConfig
      tags: [admin]
      summary: Current renter and owner commission percentages
      responses:
        "200":
          description: Commission config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionConfig"
    patch:
      operationId: updateCommissionConfig
      tags: [admin]
      summary: Update commission percentages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommissionBody"
      responses:
        "200":
          description: Updated commission config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/algorithms:
    post:
      operationId: createAlgorithm
      tags: [admin]
      summary: Add a new algorithm to the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlgorithmBody"
      responses:
        "201":
          description: Created algorithm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Algorithm"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/algorithms/{id}:
    patch:
      operationId: updateAlgorithm
      tags: [admin]
      summary: Update algorithm name, base price, or unit
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlgorithmBody"
      responses:
        "200":
          description: Updated algorithm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Algorithm"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: deleteAlgorithm
      tags: [admin]
      summary: Remove an algorithm from the catalog (only if no rigs use it)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/rigs:
    get:
      operationId: listAdminRigs
      tags: [admin]
      summary: List rigs across the platform with optional approval-status filter
      parameters:
        - in: query
          name: approvalStatus
          required: false
          schema:
            $ref: "#/components/schemas/RigApprovalStatus"
      responses:
        "200":
          description: Rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminRigRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/rigs/{id}/approve:
    post:
      operationId: approveRig
      tags: [admin]
      summary: Approve a pending rig so it appears in the marketplace
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRigDecisionBody"
      responses:
        "200":
          description: Approved rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRigRow"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/rigs/{id}/reject:
    post:
      operationId: rejectRig
      tags: [admin]
      summary: Reject a pending rig with an admin note
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRigDecisionBody"
      responses:
        "200":
          description: Rejected rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRigRow"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/rentals:
    get:
      operationId: listAdminRentals
      tags: [admin]
      summary: List every rental on the platform with renter, owner and revenue breakdown
      responses:
        "200":
          description: Rentals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminRentalRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/proxy:
    get:
      operationId: getAdminProxy
      tags: [admin]
      summary: Real-time Stratum proxy status — connected rigs and active routes
      responses:
        "200":
          description: Proxy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/proxy/rigs/{rigId}/disconnect:
    post:
      operationId: adminProxyDisconnectRig
      tags: [admin]
      summary: Force-disconnect a rig from the Stratum proxy
      parameters:
        - name: rigId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                required: [ok, message]
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/wallet/transactions:
    get:
      operationId: listAdminWalletTransactions
      tags: [admin]
      summary: Full wallet ledger across all users
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Wallet transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWalletTransactionRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/withdrawals:
    get:
      operationId: listAdminWithdrawals
      tags: [admin]
      summary: List all withdrawal requests pending approval
      responses:
        "200":
          description: Withdrawal queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawalRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/withdrawals/{id}/approve:
    post:
      operationId: approveWithdrawal
      tags: [admin]
      summary: Mark a withdrawal as paid (admin handles the actual transfer off-platform)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveWithdrawalBody"
      responses:
        "200":
          description: Approved withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/withdrawals/{id}/reject:
    post:
      operationId: rejectWithdrawal
      tags: [admin]
      summary: Reject a withdrawal and refund the user's balance
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectWithdrawalBody"
      responses:
        "200":
          description: Rejected withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

# ============================================================================
# Components
# ============================================================================
components:
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Not signed in
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Role:
      type: string
      enum: [admin, owner, renter]
      description: A user can act as renter or owner; admin is the site operator.

    MeProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        balanceUsd:
          type: number
          description: Current internal balance in USD
        totalDepositedUsd:
          type: number
        totalEarnedUsd:
          type: number
          description: Lifetime earnings as a rig owner
        totalSpentUsd:
          type: number
          description: Lifetime spend as a renter
        rigCount:
          type: integer
          description: Number of rigs the user owns (used by the UI to show the lessor nav)
        rentalCount:
          type: integer
          description: Number of rentals the user has placed
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - email
        - displayName
        - role
        - balanceUsd
        - totalDepositedUsd
        - totalEarnedUsd
        - totalSpentUsd
        - rigCount
        - rentalCount
        - createdAt

    UpdateMeBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
      required: [displayName]

    Algorithm:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Algorithm name (e.g. SHA-256, Scrypt, Ethash, RandomX)
        slug:
          type: string
        unit:
          type: string
          description: Hashrate unit shown in UI (e.g. "TH/s", "GH/s", "MH/s", "kH/s")
        basePricePerUnitPerHour:
          type: number
          description: Base USD price per unit of hashrate per hour, set by admin
        rigCount:
          type: integer
          description: Number of available rigs on this algorithm
        totalHashrate:
          type: number
          description: Sum of advertised hashrate for available rigs (in `unit`)
        averagePricePerUnitPerHour:
          type: number
          description: Average renter-facing price across active rigs
      required:
        - id
        - name
        - slug
        - unit
        - basePricePerUnitPerHour
        - rigCount
        - totalHashrate
        - averagePricePerUnitPerHour

    CreateAlgorithmBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        unit:
          type: string
          minLength: 1
        basePricePerUnitPerHour:
          type: number
          minimum: 0
      required: [name, slug, unit, basePricePerUnitPerHour]

    UpdateAlgorithmBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        unit:
          type: string
          minLength: 1
        basePricePerUnitPerHour:
          type: number
          minimum: 0

    RigStatus:
      type: string
      enum: [available, rented, offline, paused]

    RigApprovalStatus:
      type: string
      enum: [pending, approved, rejected]

    RigSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
          description: Advertised hashrate in the algorithm's unit
        pricePerUnitPerHour:
          type: number
          description: Renter-facing price (already includes the renter commission)
        minRentalHours:
          type: integer
        maxRentalHours:
          type: integer
        status:
          $ref: "#/components/schemas/RigStatus"
        approvalStatus:
          $ref: "#/components/schemas/RigApprovalStatus"
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ownerId
        - ownerDisplayName
        - algorithmId
        - algorithmName
        - algorithmUnit
        - hashrate
        - pricePerUnitPerHour
        - minRentalHours
        - maxRentalHours
        - status
        - approvalStatus
        - averageRating
        - reviewCount
        - createdAt

    RigDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
        pricePerUnitPerHour:
          type: number
        minRentalHours:
          type: integer
        maxRentalHours:
          type: integer
        status:
          $ref: "#/components/schemas/RigStatus"
        approvalStatus:
          $ref: "#/components/schemas/RigApprovalStatus"
        approvalNote:
          type: ["string", "null"]
        region:
          type: string
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        totalRentals:
          type: integer
        # Placeholder stratum endpoint the owner should point their miner at.
        # Populated for the rig owner; null for public / renter views.
        # Real routing is wired in Task 2 (Stratum proxy service).
        ownerStratumUrl:
          type: ["string", "null"]
          description: "stratum+tcp:// URL for the owner to point their miner at (placeholder until Task 2)"
        ownerWorker:
          type: ["string", "null"]
          description: "Worker name the owner's miner should use"
        ownerPassword:
          type: ["string", "null"]
          description: "Password the owner's miner should use"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - ownerId
        - ownerDisplayName
        - algorithmId
        - algorithmName
        - algorithmUnit
        - hashrate
        - pricePerUnitPerHour
        - minRentalHours
        - maxRentalHours
        - status
        - approvalStatus
        - approvalNote
        - region
        - averageRating
        - reviewCount
        - totalRentals
        - ownerStratumUrl
        - ownerWorker
        - ownerPassword
        - createdAt

    CreateRigBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 1000
        algorithmId:
          type: integer
        hashrate:
          type: number
          minimum: 0
          exclusiveMinimum: true
        minRentalHours:
          type: integer
          minimum: 1
        maxRentalHours:
          type: integer
          minimum: 1
        region:
          type: string
          minLength: 1
      required:
        - name
        - description
        - algorithmId
        - hashrate
        - minRentalHours
        - maxRentalHours
        - region

    UpdateRigBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 1000
        hashrate:
          type: number
          minimum: 0
          exclusiveMinimum: true
        minRentalHours:
          type: integer
          minimum: 1
        maxRentalHours:
          type: integer
          minimum: 1
        region:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/RigStatus"

    RentalQuoteBody:
      type: object
      properties:
        rigId:
          type: integer
        hours:
          type: integer
          minimum: 1
      required: [rigId, hours]

    RentalQuote:
      type: object
      properties:
        rigId:
          type: integer
        hours:
          type: integer
        hashrate:
          type: number
        algorithmUnit:
          type: string
        basePricePerUnitPerHour:
          type: number
        renterFeePct:
          type: number
        ownerFeePct:
          type: number
        baseSubtotalUsd:
          type: number
          description: hashrate × basePrice × hours
        renterFeeUsd:
          type: number
        renterTotalUsd:
          type: number
          description: Final amount the renter is charged
        ownerEarningsUsd:
          type: number
          description: Amount the rig owner receives if delivery is 100%
        platformFeeUsd:
          type: number
          description: Sum of renter fee + owner fee — site revenue
      required:
        - rigId
        - hours
        - hashrate
        - algorithmUnit
        - basePricePerUnitPerHour
        - renterFeePct
        - ownerFeePct
        - baseSubtotalUsd
        - renterFeeUsd
        - renterTotalUsd
        - ownerEarningsUsd
        - platformFeeUsd

    CreateRentalBody:
      type: object
      properties:
        rigId:
          type: integer
        hours:
          type: integer
          minimum: 1
        poolUrl:
          type: string
          minLength: 1
          description: Renter's stratum pool endpoint (e.g. stratum+tcp://pool.example.com:3333)
        poolWorker:
          type: string
          minLength: 1
        poolPassword:
          type: string
          default: "x"
      required: [rigId, hours, poolUrl, poolWorker]

    RentalStatus:
      type: string
      enum: [pending, active, completed, cancelled]

    RentalSummary:
      type: object
      properties:
        id:
          type: integer
        rigId:
          type: integer
        rigName:
          type: string
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        renterId:
          type: integer
        renterDisplayName:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        hashrate:
          type: number
        hours:
          type: integer
        renterTotalUsd:
          type: number
        ownerEarningsUsd:
          type: number
        status:
          $ref: "#/components/schemas/RentalStatus"
        startedAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        deliveredHashrateAvg:
          type: ["number", "null"]
      required:
        - id
        - rigId
        - rigName
        - algorithmName
        - algorithmUnit
        - renterId
        - renterDisplayName
        - ownerId
        - ownerDisplayName
        - hashrate
        - hours
        - renterTotalUsd
        - ownerEarningsUsd
        - status
        - startedAt
        - endsAt
        - deliveredHashrateAvg

    RentalDetail:
      type: object
      properties:
        id:
          type: integer
        rigId:
          type: integer
        rigName:
          type: string
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        renterId:
          type: integer
        renterDisplayName:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        hashrate:
          type: number
        hours:
          type: integer
        basePricePerUnitPerHour:
          type: number
        renterFeePct:
          type: number
        ownerFeePct:
          type: number
        renterTotalUsd:
          type: number
        ownerEarningsUsd:
          type: number
        platformFeeUsd:
          type: number
        status:
          $ref: "#/components/schemas/RentalStatus"
        startedAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        cancelledAt:
          type: ["string", "null"]
          format: date-time
        settledAt:
          type: ["string", "null"]
          format: date-time
        poolUrl:
          type: string
        poolWorker:
          type: string
        poolPassword:
          type: string
        stratumProxyUrl:
          type: string
          description: Where the rented rig should connect (placeholder until Stratum proxy ships)
        proxyWorker:
          type: string
          description: Worker name to advertise to the rig (placeholder)
        proxyPassword:
          type: string
        deliveredHashrateAvg:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - rigId
        - rigName
        - algorithmName
        - algorithmUnit
        - renterId
        - renterDisplayName
        - ownerId
        - ownerDisplayName
        - hashrate
        - hours
        - basePricePerUnitPerHour
        - renterFeePct
        - ownerFeePct
        - renterTotalUsd
        - ownerEarningsUsd
        - platformFeeUsd
        - status
        - startedAt
        - endsAt
        - cancelledAt
        - settledAt
        - poolUrl
        - poolWorker
        - poolPassword
        - stratumProxyUrl
        - proxyWorker
        - proxyPassword
        - deliveredHashrateAvg
        - createdAt

    HashSamplePoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        hashrate:
          type: number
      required: [timestamp, hashrate]

    ProxyConnectedRig:
      type: object
      properties:
        rigId:
          type: integer
        rigName:
          type: string
        connectedAt:
          type: string
          format: date-time
        authorized:
          type: boolean
        rentalId:
          type: ["integer", "null"]
        sharesAccepted:
          type: integer
        sharesRejected:
          type: integer
        lastShareAt:
          type: ["string", "null"]
          format: date-time
        upstreamConnected:
          type: boolean
      required:
        - rigId
        - rigName
        - connectedAt
        - authorized
        - rentalId
        - sharesAccepted
        - sharesRejected
        - lastShareAt
        - upstreamConnected

    ProxyStatus:
      type: object
      properties:
        connectedRigs:
          type: array
          items:
            $ref: "#/components/schemas/ProxyConnectedRig"
        activeRoutes:
          type: integer
        totalSharesPerSec:
          type: number
      required:
        - connectedRigs
        - activeRoutes
        - totalSharesPerSec

    RentalStats:
      type: object
      properties:
        rentalId:
          type: integer
        currentHashrate:
          type: number
        averageHashrate:
          type: number
        deliveryRatio:
          type: number
          description: Average delivered hashrate divided by advertised hashrate (0–1)
        sharesAccepted:
          type: integer
        sharesRejected:
          type: integer
        secondsRemaining:
          type: integer
        status:
          $ref: "#/components/schemas/RentalStatus"
        samples:
          type: array
          items:
            $ref: "#/components/schemas/HashSamplePoint"
        message:
          type: ["string", "null"]
          description: Optional human-readable status note (e.g. "awaiting hash data")
        minerConnected:
          type: boolean
          description: Whether the rig's miner is currently connected to the proxy
        upstreamConnected:
          type: boolean
          description: Whether the proxy has an active connection to the renter's pool
      required:
        - rentalId
        - currentHashrate
        - averageHashrate
        - deliveryRatio
        - sharesAccepted
        - sharesRejected
        - secondsRemaining
        - status
        - samples
        - message
        - minerConnected
        - upstreamConnected

    Review:
      type: object
      properties:
        id:
          type: integer
        rigId:
          type: integer
        rentalId:
          type: integer
        renterDisplayName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - rigId
        - rentalId
        - renterDisplayName
        - rating
        - body
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        body:
          type: string
          minLength: 1
          maxLength: 1000
      required: [rating, body]

    WalletTransactionType:
      type: string
      enum:
        - deposit
        - withdrawal
        - rental_charge
        - rental_payout
        - rental_refund
        - admin_credit
        - admin_debit

    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
        type:
          $ref: "#/components/schemas/WalletTransactionType"
        amountUsd:
          type: number
          description: Signed amount — positive credit, negative debit
        balanceAfterUsd:
          type: number
        memo:
          type: string
        relatedRentalId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amountUsd
        - balanceAfterUsd
        - memo
        - relatedRentalId
        - createdAt

    Wallet:
      type: object
      properties:
        balanceUsd:
          type: number
        pendingWithdrawalsUsd:
          type: number
        totalDepositedUsd:
          type: number
        totalEarnedUsd:
          type: number
        totalSpentUsd:
          type: number
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"
      required:
        - balanceUsd
        - pendingWithdrawalsUsd
        - totalDepositedUsd
        - totalEarnedUsd
        - totalSpentUsd
        - transactions

    DepositAsset:
      type: string
      enum: [BTC, USDT]

    CreateDepositBody:
      type: object
      properties:
        asset:
          $ref: "#/components/schemas/DepositAsset"
        amountUsd:
          type: number
          description: Approximate USD value the user intends to deposit
          minimum: 0
          exclusiveMinimum: true
      required: [asset, amountUsd]

    DepositInstructions:
      type: object
      properties:
        asset:
          $ref: "#/components/schemas/DepositAsset"
        depositAddress:
          type: string
        memo:
          type: string
        amountUsd:
          type: number
        note:
          type: string
          description: Human-readable note (e.g. "Funds will appear after on-chain confirmation")
      required:
        - asset
        - depositAddress
        - memo
        - amountUsd
        - note

    WithdrawalStatus:
      type: string
      enum: [pending, approved, rejected]

    WithdrawalRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        asset:
          $ref: "#/components/schemas/DepositAsset"
        destinationAddress:
          type: string
        amountUsd:
          type: number
        status:
          $ref: "#/components/schemas/WithdrawalStatus"
        adminNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - userId
        - asset
        - destinationAddress
        - amountUsd
        - status
        - adminNote
        - createdAt
        - decidedAt

    CreateWithdrawalBody:
      type: object
      properties:
        asset:
          $ref: "#/components/schemas/DepositAsset"
        destinationAddress:
          type: string
          minLength: 8
        amountUsd:
          type: number
          minimum: 0
          exclusiveMinimum: true
      required: [asset, destinationAddress, amountUsd]

    ApproveWithdrawalBody:
      type: object
      properties:
        adminNote:
          type: string

    RejectWithdrawalBody:
      type: object
      properties:
        adminNote:
          type: string

    CommissionConfig:
      type: object
      properties:
        renterFeePct:
          type: number
          description: Percentage charged on top of base price for renters (e.g. 3 = 3%)
        ownerFeePct:
          type: number
          description: Percentage withheld from owner earnings (e.g. 5 = 5%)
        updatedAt:
          type: string
          format: date-time
      required: [renterFeePct, ownerFeePct, updatedAt]

    UpdateCommissionBody:
      type: object
      properties:
        renterFeePct:
          type: number
          minimum: 0
          maximum: 50
        ownerFeePct:
          type: number
          minimum: 0
          maximum: 50

    AdminCreditBody:
      type: object
      properties:
        userId:
          type: integer
        amountUsd:
          type: number
          description: Signed amount; positive credits, negative debits
        memo:
          type: string
          minLength: 1
          maxLength: 200
      required: [userId, amountUsd, memo]

    AdminUserRow:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        balanceUsd:
          type: number
        totalDepositedUsd:
          type: number
        totalEarnedUsd:
          type: number
        totalSpentUsd:
          type: number
        rigCount:
          type: integer
        rentalCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - email
        - displayName
        - role
        - balanceUsd
        - totalDepositedUsd
        - totalEarnedUsd
        - totalSpentUsd
        - rigCount
        - rentalCount
        - createdAt

    AdminRigRow:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
        ownerEmail:
          type: string
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
        pricePerUnitPerHour:
          type: number
        region:
          type: string
        status:
          $ref: "#/components/schemas/RigStatus"
        approvalStatus:
          $ref: "#/components/schemas/RigApprovalStatus"
        approvalNote:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - ownerId
        - ownerEmail
