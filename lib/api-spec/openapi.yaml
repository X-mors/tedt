openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RigMarket API — mining rig rental marketplace
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: marketplace
    description: Public marketplace browsing and aggregates
  - name: algorithms
    description: Mining algorithm catalog
  - name: rigs
    description: Mining rig listings (lessor inventory)
  - name: rentals
    description: Rental orders, quotes, and live stats
  - name: reviews
    description: Renter reviews of completed rentals
  - name: wallet
    description: Internal balance, deposits, and withdrawals
  - name: me
    description: Current authenticated user
  - name: admin
    description: Admin-only operations (site owner)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ========================================================================
  # Current user (me)
  # ========================================================================
  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get the current authenticated user with role and wallet snapshot
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMe
      tags: [me]
      summary: Update the current user's display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/upgrade-to-owner:
    post:
      operationId: upgradeToOwner
      tags: [me]
      summary: Upgrade the current renter account to owner role so they can list rigs
      security:
        - clerk: []
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: Already an owner or admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/sync:
    post:
      operationId: syncMe
      tags: [me]
      summary: Upsert the current user record from Clerk identity (called once after sign-in)
      responses:
        "200":
          description: Synced user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Marketplace browsing
  # ========================================================================
  /marketplace/featured:
    get:
      operationId: getMarketplaceFeatured
      tags: [marketplace]
      summary: Featured rigs — highest-rated, currently available rigs across top algorithms
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Featured rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"

  /marketplace/algorithm-stats:
    get:
      operationId: getMarketplaceAlgorithmStats
      tags: [marketplace]
      summary: Per-algorithm marketplace stats — hashrate available, rig count, avg price, rental volume
      responses:
        "200":
          description: Algorithm marketplace statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlgorithmMarketStat"

  /marketplace/summary:
    get:
      operationId: getMarketplaceSummary
      tags: [marketplace]
      summary: Top-line marketplace statistics (rig counts, total hashrate, average prices)
      responses:
        "200":
          description: Marketplace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSummary"

  /algorithms:
    get:
      operationId: listAlgorithms
      tags: [algorithms]
      summary: List all mining algorithms with pricing and rig counts
      responses:
        "200":
          description: Algorithm catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Algorithm"

  /rigs:
    get:
      operationId: listRigs
      tags: [rigs]
      summary: Browse available rigs with optional filters
      parameters:
        - in: query
          name: algorithmId
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [available, rented, offline, paused]
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [price_asc, price_desc, hashrate_desc, newest, rating_desc]
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Rig listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"

  /rigs/{id}:
    get:
      operationId: getRig
      tags: [rigs]
      summary: Get full details for a single rig
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Rig details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /rigs/{id}/reviews:
    get:
      operationId: listRigReviews
      tags: [reviews]
      summary: List reviews for a rig
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # ========================================================================
  # Rig owner (lessor) endpoints
  # ========================================================================
  /me/rigs:
    get:
      operationId: listMyRigs
      tags: [rigs]
      summary: List rigs owned by the current user
      responses:
        "200":
          description: My rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRig
      tags: [rigs]
      summary: List a new rig for rent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRigBody"
      responses:
        "201":
          description: Created rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rigs/{id}:
    get:
      operationId: getMyRig
      tags: [rigs]
      summary: Load a rig you own (works for pending/rejected rigs that are hidden from the public marketplace)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Owner-scoped rig detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMyRig
      tags: [rigs]
      summary: Update a rig you own
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRigBody"
      responses:
        "200":
          description: Updated rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMyRig
      tags: [rigs]
      summary: Delete a rig you own (only if no active rentals)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rentals/lessor:
    get:
      operationId: listLessorRentals
      tags: [rentals]
      summary: List rentals on rigs owned by the current user
      responses:
        "200":
          description: Rentals on my rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Renter endpoints
  # ========================================================================
  /rentals/quote:
    post:
      operationId: createRentalQuote
      tags: [rentals]
      summary: Compute pricing breakdown for a potential rental (no commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RentalQuoteBody"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalQuote"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /rentals:
    post:
      operationId: createRental
      tags: [rentals]
      summary: Place a rental order — debits the renter's wallet and reserves the rig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalBody"
      responses:
        "201":
          description: Rental created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rentals/{id}:
    get:
      operationId: getRental
      tags: [rentals]
      summary: Get rental details (renter or rig owner only)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/stats:
    get:
      operationId: getRentalStats
      tags: [rentals]
      summary: Historical mining stats + sparkline for a rental
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Stats with sparkline samples
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalStats"
        "404":
          $ref: "#/components/responses/NotFound"

  /rentals/{id}/live:
    get:
      operationId: getRentalLive
      tags: [rentals]
      summary: Real-time proxy state for a rental (poll every 3-5s)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Live proxy snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalLive"
        "404":
          $ref: "#/components/responses/NotFound"

  /rentals/{id}/cancel:
    post:
      operationId: cancelRental
      tags: [rentals]
      summary: Cancel an active rental — refunds remaining time prorated
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Cancelled rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/review:
    post:
      operationId: createRentalReview
      tags: [reviews]
      summary: Submit a review for a completed rental (renter only, once)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rentals:
    get:
      operationId: listMyRentals
      tags: [rentals]
      summary: List rentals placed by the current user (renter view)
      responses:
        "200":
          description: My rentals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Wallet
  # ========================================================================
  /me/wallet:
    get:
      operationId: getMyWallet
      tags: [wallet]
      summary: Wallet balances and recent transactions for the current user
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pool/test:
    post:
      operationId: testPoolConnection
      tags: [pool]
      summary: Test a Stratum pool connection — opens a real mining.subscribe + mining.authorize handshake
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolTestBody"
      responses:
        "200":
          description: Test result (check the success field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolTestResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /wallet/processor-status:
    get:
      operationId: getProcessorStatus
      tags: [wallet]
      summary: Check NOWPayments processor health (no auth required)
      responses:
        "200":
          description: Processor status
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured:
                    type: boolean
                  reachable:
                    type: boolean
                  latencyMs:
                    type: number
                    nullable: true
                  error:
                    type: string
                    nullable: true
                required: [configured, reachable]

  /me/wallet/deposit-addresses:
    get:
      operationId: getDepositAddresses
      tags: [wallet]
      summary: Get or provision per-currency deposit addresses for the current user
      responses:
        "200":
          description: Deposit addresses for BTC and USDT-TRC20
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositAddressesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wallet/deposits:
    get:
      operationId: listMyDeposits
      tags: [wallet]
      summary: List the current user's on-chain crypto deposits
      responses:
        "200":
          description: Crypto deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CryptoDepositItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createDeposit
      tags: [wallet]
      summary: "Deprecated — use GET /me/wallet/deposit-addresses instead"
      responses:
        "410":
          description: Endpoint replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /wallet/webhook/nowpayments:
    post:
      operationId: nowpaymentsWebhook
      tags: [wallet]
      summary: NOWPayments IPN webhook — receives payment status updates
      description: Public endpoint (no auth). Verifies HMAC-SHA512 signature from x-nowpayments-sig header.
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "400":
          $ref: "#/components/responses/BadRequest"

  /me/wallet/withdrawals:
    get:
      operationId: listMyWithdrawals
      tags: [wallet]
      summary: List the current user's withdrawal requests
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createWithdrawal
      tags: [wallet]
      summary: Submit a withdrawal request (admin must approve)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWithdrawalBody"
      responses:
        "201":
          description: Withdrawal request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ========================================================================
  # Saved pool credentials (renters & owners)
  # ========================================================================
  /me/pools:
    get:
      operationId: listMyPools
      tags: [pools]
      summary: List the current user's saved pool credentials
      responses:
        "200":
          description: Saved pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPool"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMyPool
      tags: [pools]
      summary: Save a new pool credential profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserPoolBody"
      responses:
        "201":
          description: Created pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPool"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/pools/{id}:
    patch:
      operationId: updateMyPool
      tags: [pools]
      summary: Update a saved pool credential profile
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserPoolBody"
      responses:
        "200":
          description: Updated pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPool"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMyPool
      tags: [pools]
      summary: Delete a saved pool credential profile
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/extend:
    post:
      operationId: extendRental
      tags: [rentals]
      summary: Extend an active rental by additional hours (renter pays incremental cost using the rental's locked-in pricing). Total hours cannot exceed the rig's maxRentalHours.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtendRentalBody"
      responses:
        "200":
          description: Updated rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/switch-pool:
    post:
      operationId: switchRentalPool
      tags: [rentals]
      summary: Live-switch the destination pool for an active rental without losing the session
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchRentalPoolBody"
      responses:
        "200":
          description: Updated rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rigs/{id}/live:
    get:
      operationId: getMyRigLive
      tags: [rigs]
      summary: Live telemetry for an owner's rig when no rental is active (idle fallback mining)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Owner-side live snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerRigLive"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rigs/{id}/stats:
    get:
      operationId: getMyRigStats
      tags: [rigs]
      summary: Hashrate history for an owner's rig (up to 14 days, downsampled for chart)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Owner-side hashrate samples with rental periods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerRigStats"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Dashboard summaries (authenticated)
  # ========================================================================
  /dashboard/owner-summary:
    get:
      operationId: getDashboardOwnerSummary
      tags: [dashboard]
      summary: Owner dashboard — rig counts, total earnings, active rentals, pending payouts
      security:
        - clerk: []
      responses:
        "200":
          description: Owner dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerDashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/renter-summary:
    get:
      operationId: getDashboardRenterSummary
      tags: [dashboard]
      summary: Renter dashboard — active rental count, total spend, favourite algorithm, spending this month
      security:
        - clerk: []
      responses:
        "200":
          description: Renter dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenterDashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Admin (site owner only)
  # ========================================================================
  /admin/summary:
    get:
      operationId: getAdminSummary
      tags: [admin]
      summary: Condensed admin overview — key headline numbers for the admin nav bar / quick-glance widget
      security:
        - clerk: []
      responses:
        "200":
          description: Admin summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform-wide aggregates for the admin dashboard
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all platform users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserRow"
