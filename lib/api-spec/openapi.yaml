openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RigMarket API — mining rig rental marketplace
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: marketplace
    description: Public marketplace browsing and aggregates
  - name: algorithms
    description: Mining algorithm catalog
  - name: rigs
    description: Mining rig listings (lessor inventory)
  - name: rentals
    description: Rental orders, quotes, and live stats
  - name: reviews
    description: Renter reviews of completed rentals
  - name: wallet
    description: Internal balance, deposits, and withdrawals
  - name: me
    description: Current authenticated user
  - name: admin
    description: Admin-only operations (site owner)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ========================================================================
  # Current user (me)
  # ========================================================================
  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get the current authenticated user with role and wallet snapshot
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMe
      tags: [me]
      summary: Update the current user's display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/sync:
    post:
      operationId: syncMe
      tags: [me]
      summary: Upsert the current user record from Clerk identity (called once after sign-in)
      responses:
        "200":
          description: Synced user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Marketplace browsing
  # ========================================================================
  /marketplace/summary:
    get:
      operationId: getMarketplaceSummary
      tags: [marketplace]
      summary: Top-line marketplace statistics (rig counts, total hashrate, average prices)
      responses:
        "200":
          description: Marketplace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSummary"

  /algorithms:
    get:
      operationId: listAlgorithms
      tags: [algorithms]
      summary: List all mining algorithms with pricing and rig counts
      responses:
        "200":
          description: Algorithm catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Algorithm"

  /rigs:
    get:
      operationId: listRigs
      tags: [rigs]
      summary: Browse available rigs with optional filters
      parameters:
        - in: query
          name: algorithmId
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [available, rented, offline]
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [price_asc, price_desc, hashrate_desc, newest]
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Rig listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"

  /rigs/{id}:
    get:
      operationId: getRig
      tags: [rigs]
      summary: Get full details for a single rig
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Rig details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /rigs/{id}/reviews:
    get:
      operationId: listRigReviews
      tags: [reviews]
      summary: List reviews for a rig
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # ========================================================================
  # Rig owner (lessor) endpoints
  # ========================================================================
  /me/rigs:
    get:
      operationId: listMyRigs
      tags: [rigs]
      summary: List rigs owned by the current user
      responses:
        "200":
          description: My rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RigSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRig
      tags: [rigs]
      summary: List a new rig for rent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRigBody"
      responses:
        "201":
          description: Created rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rigs/{id}:
    patch:
      operationId: updateMyRig
      tags: [rigs]
      summary: Update a rig you own
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRigBody"
      responses:
        "200":
          description: Updated rig
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMyRig
      tags: [rigs]
      summary: Delete a rig you own (only if no active rentals)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rentals/lessor:
    get:
      operationId: listLessorRentals
      tags: [rentals]
      summary: List rentals on rigs owned by the current user
      responses:
        "200":
          description: Rentals on my rigs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Renter endpoints
  # ========================================================================
  /rentals/quote:
    post:
      operationId: createRentalQuote
      tags: [rentals]
      summary: Compute pricing breakdown for a potential rental (no commit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RentalQuoteBody"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalQuote"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /rentals:
    post:
      operationId: createRental
      tags: [rentals]
      summary: Place a rental order — debits the renter's wallet and reserves the rig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalBody"
      responses:
        "201":
          description: Rental created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rentals/{id}:
    get:
      operationId: getRental
      tags: [rentals]
      summary: Get rental details (renter or rig owner only)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/stats:
    get:
      operationId: getRentalStats
      tags: [rentals]
      summary: Live mining stats for a rental (placeholder until Stratum proxy ships)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Live stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalStats"
        "404":
          $ref: "#/components/responses/NotFound"

  /rentals/{id}/cancel:
    post:
      operationId: cancelRental
      tags: [rentals]
      summary: Cancel an active rental — refunds remaining time prorated
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Cancelled rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rentals/{id}/review:
    post:
      operationId: createRentalReview
      tags: [reviews]
      summary: Submit a review for a completed rental (renter only, once)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/rentals:
    get:
      operationId: listMyRentals
      tags: [rentals]
      summary: List rentals placed by the current user (renter view)
      responses:
        "200":
          description: My rentals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Wallet
  # ========================================================================
  /me/wallet:
    get:
      operationId: getMyWallet
      tags: [wallet]
      summary: Wallet balances and recent transactions for the current user
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wallet/deposits:
    post:
      operationId: createDeposit
      tags: [wallet]
      summary: Request a deposit address for BTC or USDT funding (placeholder until wallet integration ships)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositBody"
      responses:
        "201":
          description: Deposit instructions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositInstructions"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/wallet/withdrawals:
    get:
      operationId: listMyWithdrawals
      tags: [wallet]
      summary: List the current user's withdrawal requests
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createWithdrawal
      tags: [wallet]
      summary: Submit a withdrawal request (admin must approve)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWithdrawalBody"
      responses:
        "201":
          description: Withdrawal request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ========================================================================
  # Admin (site owner only)
  # ========================================================================
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform-wide aggregates for the admin dashboard
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all platform users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/wallet/credit:
    post:
      operationId: adminCreditWallet
      tags: [admin]
      summary: Manually credit (or debit) a user's wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreditBody"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/commission:
    get:
      operationId: getCommissionConfig
      tags: [admin]
      summary: Current renter and owner commission percentages
      responses:
        "200":
          description: Commission config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionConfig"
    patch:
      operationId: updateCommissionConfig
      tags: [admin]
      summary: Update commission percentages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommissionBody"
      responses:
        "200":
          description: Updated commission config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/algorithms:
    post:
      operationId: createAlgorithm
      tags: [admin]
      summary: Add a new algorithm to the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlgorithmBody"
      responses:
        "201":
          description: Created algorithm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Algorithm"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/algorithms/{id}:
    patch:
      operationId: updateAlgorithm
      tags: [admin]
      summary: Update algorithm name, base price, or unit
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlgorithmBody"
      responses:
        "200":
          description: Updated algorithm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Algorithm"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: deleteAlgorithm
      tags: [admin]
      summary: Remove an algorithm from the catalog (only if no rigs use it)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/withdrawals:
    get:
      operationId: listAdminWithdrawals
      tags: [admin]
      summary: List all withdrawal requests pending approval
      responses:
        "200":
          description: Withdrawal queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawalRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/withdrawals/{id}/approve:
    post:
      operationId: approveWithdrawal
      tags: [admin]
      summary: Mark a withdrawal as paid (admin handles the actual transfer off-platform)
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveWithdrawalBody"
      responses:
        "200":
          description: Approved withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/withdrawals/{id}/reject:
    post:
      operationId: rejectWithdrawal
      tags: [admin]
      summary: Reject a withdrawal and refund the user's balance
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectWithdrawalBody"
      responses:
        "200":
          description: Rejected withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

# ============================================================================
# Components
# ============================================================================
components:
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Not signed in
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Role:
      type: string
      enum: [admin, owner, renter]
      description: A user can act as renter or owner; admin is the site operator.

    MeProfile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        balanceUsd:
          type: number
          description: Current internal balance in USD
        totalDepositedUsd:
          type: number
        totalEarnedUsd:
          type: number
          description: Lifetime earnings as a rig owner
        totalSpentUsd:
          type: number
          description: Lifetime spend as a renter
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkUserId
        - email
        - displayName
        - role
        - balanceUsd
        - totalDepositedUsd
        - totalEarnedUsd
        - totalSpentUsd
        - createdAt

    UpdateMeBody:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
      required: [displayName]

    Algorithm:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Algorithm name (e.g. SHA-256, Scrypt, Ethash, RandomX)
        slug:
          type: string
        unit:
          type: string
          description: Hashrate unit shown in UI (e.g. "TH/s", "GH/s", "MH/s", "kH/s")
        basePricePerUnitPerHour:
          type: number
          description: Base USD price per unit of hashrate per hour, set by admin
        rigCount:
          type: integer
          description: Number of available rigs on this algorithm
        totalHashrate:
          type: number
          description: Sum of advertised hashrate for available rigs (in `unit`)
        averagePricePerUnitPerHour:
          type: number
          description: Average renter-facing price across active rigs
      required:
        - id
        - name
        - slug
        - unit
        - basePricePerUnitPerHour
        - rigCount
        - totalHashrate
        - averagePricePerUnitPerHour

    CreateAlgorithmBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        unit:
          type: string
          minLength: 1
        basePricePerUnitPerHour:
          type: number
          minimum: 0
      required: [name, slug, unit, basePricePerUnitPerHour]

    UpdateAlgorithmBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        unit:
          type: string
          minLength: 1
        basePricePerUnitPerHour:
          type: number
          minimum: 0

    RigStatus:
      type: string
      enum: [available, rented, offline]

    RigSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
          description: Advertised hashrate in the algorithm's unit
        pricePerUnitPerHour:
          type: number
          description: Renter-facing price (already includes the renter commission)
        minRentalHours:
          type: integer
        maxRentalHours:
          type: integer
        status:
          $ref: "#/components/schemas/RigStatus"
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ownerId
        - ownerDisplayName
        - algorithmId
        - algorithmName
        - algorithmUnit
        - hashrate
        - pricePerUnitPerHour
        - minRentalHours
        - maxRentalHours
        - status
        - averageRating
        - reviewCount
        - createdAt

    RigDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
        ownerDisplayName:
          type: string
        algorithmId:
          type: integer
        algorithmName:
          type: string
        algorithmUnit:
          type: string
        hashrate:
          type: number
        pricePerUnitPerHour:
          type: number
        minRentalHours:
          type: integer
        maxRentalHours:
          type: integer
        status:
          $ref: "#/components/schemas/RigStatus"
        region:
          type: string
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        totalRentals:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
