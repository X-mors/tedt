kind = "web"
previewPath = "/"
title = "RigMarket"
version = "1.0.0"
id = "artifacts/rigmarket"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25486

[services.development]
run = "pnpm --filter @workspace/rigmarket run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rigmarket", "run", "build" ]
publicDir = "artifacts/rigmarket/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25486"
BASE_PATH = "/"
